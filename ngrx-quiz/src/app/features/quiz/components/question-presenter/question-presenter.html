<h1>
   {{q_store.title()}}
   @for (record of q_store.captionColors(); track $index)
   {
      @if($index > 0) { @if ($last) { and } @else { , } }
      {{ record.name }}
      <span class="color-item" [style.background]="record.key"></span>
   } ?
</h1>
<div class="answers">
   @for(record of q_store.answerColors(); track $index) {
   <div class="answer" (click)="q_store.addAnswer($index)">
      <div class="thumbnail" [style.background]="record.key"></div>
      <div class="caption">{{ record.name }}</div>
   </div>
   }
</div>
