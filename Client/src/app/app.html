<app-toolbar caption="Color Quiz" icon="palette">
   <button mat-icon-button class="" (click)="store.reset()">
      <mat-icon>restart_alt</mat-icon>
   </button>
   <button mat-icon-button matTooltip="Generate New Quiz">
      <mat-icon>auto_fix_high</mat-icon>
   </button>
</app-toolbar>

<div class="main">
   @if (store.isDone()) {
      <app-done />
   } @else {
      <app-progress />
      <app-question-presenter />
   }
</div>
